<div class="crear-paquetes-page">

    <section class="destinos-card">
        <header class="destinos-header">
            <h2>Categorias</h2>
            <p>Categorias disponibles en el sistema.</p>
        </header>

        <div class="destinos-table-wrapper">
            <table class="destinos-table">
                <thead>
                    <tr>
                        <th>ID categorias</th>
                        <th>Nombre</th>
                        <th>Descripcion</th>
                        <th>Activa</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let c of categorias">
                        <td>{{ c.id_categoria }}</td>
                        <td>{{ c.nombre }}</td>
                        <td>{{ c.descripcion }}</td>
                        <td>{{ c.estado }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>



    <section class="form-card">
        <header class="form-header">
            <h1>Crear Habilidades</h1>
        </header>

        <form class="paquete-form">

            <div class="field">
                <label for="id_categoria">ID de Categoria a la que pertenece</label>
                <input [(ngModel)]="id_categoria" type="number" name="id_categoria" id="id_categoria" required>
            </div>

            <div class="field">
                <label for="nombre">Nombre de categoria</label>
                <input [(ngModel)]="nombre" type="text" name="nombre" id="nombre" required>
            </div>

            <div class="field-full">
                <label for="descripcion">Descripción</label>
                <textarea [(ngModel)]="descripcion" name="descripcion" id="descripcion" rows="3"></textarea>
            </div>

            <div class="actions">
                <button (click)="crearHabilidad()" class="btn-submit">Crear</button>
            </div>

        </form>

        <div *ngIf="mensajeError" style="color: rgb(255, 0, 0);">
            {{ mensajeError }}
        </div>
    </section>
</div>

<app-menu-admin></app-menu-admin>
