<div class="formulario-reportes">
    <h1>Reportes de Freelancer</h1>
    <h2>Ingresar las fechas a buscar</h2>

    <form>
        <div class="campos-fechas">
            <div class="campo">
                <label for="fechaInicio">Fecha de inicio:</label>
                <input [(ngModel)]="fechaInicio" type="date" id="fechaInicio" name="fechaInicio" required>
            </div>

            <div class="campo">
                <label for="fechaFin">Fecha de fin:</label>
                <input [(ngModel)]="fechaFin" type="date" id="fechaFin" name="fechaFin" required>
            </div>
        </div>

        <div class="botones">
            <button (click)="mostrarReporte('contratos')" type="button" class="btn-ventas">Historial de
                Contratos</button>
            <button (click)="mostrarReporte('categorias')" type="button" class="btn-ventas">Top 5 categorias
            </button>
            <button (click)="mostrarReporte('propuestas')" type="button" class="btn-ventas">Propuestas Enviadas
            </button>
        </div>
        <br>

    </form>
</div>

<app-reporte-historial-contratos 
*ngIf="tipoReporte === 'contratos'"
 [fechaInicio]="fechaInicio" 
 [fechaFin]="fechaFin"
[id_usuario]="id_usuario">
</app-reporte-historial-contratos>

<app-reporte-top-categorias-freelancer 
*ngIf="tipoReporte === 'categorias'"
 [fechaInicio]="fechaInicio" 
 [fechaFin]="fechaFin"
[id_usuario]="id_usuario">
</app-reporte-top-categorias-freelancer>

<app-reporte-propuestas-freelancer 
*ngIf="tipoReporte === 'propuestas'"
 [fechaInicio]="fechaInicio" 
 [fechaFin]="fechaFin"
[id_usuario]="id_usuario">
</app-reporte-propuestas-freelancer>



<app-menu-freelancer></app-menu-freelancer>
