<div class="reporte-ventas-wrapper">
    <div *ngIf="mensajeError" style="color: rgb(255, 0, 0);">
        {{ mensajeError }}
    </div>
    <section class="reporte-ventas-card">
        <header class="reporte-ventas-header">
            <h2>Historial de contratos completados en un intervalo de tiempo</h2>
        </header>

        <div class="reporte-ventas-scroll">
            <table class="reporte-ventas-table">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Proyecto</th>
                        <th>Monto Recibido</th>
                        <th>Puntualcion Recibida</th>
                        <th>Comentario Recibido</th>
                        <th>Fecha Fin</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let c of contratos">
                        <td>{{ c.cliente }}</td>
                        <td>{{ c.proyecto }}</td>
                        <td>{{ c.monto_recibido }}</td>
                        <td>{{ c.puntuacion }}</td>
                        <td>{{ c.comentario }}</td>
                        <td>{{ c.fecha_fin }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
